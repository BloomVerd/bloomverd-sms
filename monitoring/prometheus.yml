global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bloomverd-sms-monitor'

scrape_configs:
  # NestJS Application metrics
  - job_name: 'nestjs-app'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'bloomverd-sms-api'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system-metrics'
