server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Combined logs (all logs in JSON format)
  - job_name: bloomverd-combined
    static_configs:
      - targets:
          - localhost
        labels:
          job: bloomverd-sms
          env: development
          log_type: combined
          __path__: /var/log/bloomverd/combined.log
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            message: message
            context: context
            timestamp: timestamp
            service: service
            environment: environment
      # Extract timestamp
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05'
      # Add labels
      - labels:
          level:
          context:
          service:

  # Error logs only
  - job_name: bloomverd-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: bloomverd-sms
          env: development
          log_type: error
          __path__: /var/log/bloomverd/error.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            context: context
            timestamp: timestamp
            stack: stack
            name: name
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05'
      - labels:
          level:
          context:
          name:
